<index.html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Accuracy Checker + Vision</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
<style>
  :root {
    --bg: #0a0c0f; --surface: #111418; --border: #1e2530;
    --accent: #c8a96e; --accent-dim: #7a6540;
    --red: #e05252; --green: #52c0a0; --blue: #7ab8e0;
    --text: #e8e0d0; --muted: #6b7280;
  }
  /* Original Styles from your app */
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 56px; overflow-x:hidden;
  }
  /* ... (Keeping all your original CSS here) ... */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:100%; max-width:520px; margin-bottom:16px; padding:20px; }
  .btn { padding:12px; border-radius:8px; border:none; cursor:pointer; font-family:'Bebas Neue'; letter-spacing:1px; width:100%; margin-top:10px; }
  
  /* NEW VISION STYLES */
  #vision-modal {
    display:none; position:fixed; inset:0; background:black; z-index:2000;
    flex-direction:column; align-items:center; justify-content:center;
  }
  .viewfinder {
    position:absolute; width:280px; height:120px; border:3px solid var(--accent);
    border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.7);
    display:flex; align-items:center; justify-content:center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">GEMINI POWERED</div>
  <h1>WATCH ACCURACY CHECKER</h1>
</header>

<div class="card">
  <div class="panel-label">Control Center</div>
  <button class="btn" style="background:var(--accent); color:black;" onclick="syncTime()">Manual Sync</button>
  
  <button class="btn" style="background:var(--blue); color:black;" onclick="openVisionScanner()">📷 VISION SYNC (BETA)</button>
</div>

<div id="vision-modal">
  <video id="vision-feed" autoplay playsinline style="width:100%; height:80%; object-fit:contain;"></video>
  <div class="viewfinder">
     <div style="color:var(--accent); font-family:'Share Tech Mono'; font-size:12px; transform:translateY(-80px)">ALIGN DIGITAL DISPLAY HERE</div>
  </div>
  <div style="padding:20px; display:flex; gap:15px; width:100%; max-width:400px;">
    <button class="btn" onclick="closeVisionScanner()" style="background:#444; color:white;">CANCEL</button>
    <button id="capture-btn" class="btn" onclick="captureAndProcess()" style="background:var(--green); color:black; flex:2;">CAPTURE TIME</button>
  </div>
  <canvas id="ocr-canvas" style="display:none;"></canvas>
</div>

<script>
// --- Vision Sync Logic ---
let stream = null;

async function openVisionScanner() {
  const modal = document.getElementById('vision-modal');
  const video = document.getElementById('vision-feed');
  modal.style.display = 'flex';
  
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
  } catch (err) {
    alert("Camera error: " + err.message);
    closeVisionScanner();
  }
}

function closeVisionScanner() {
  if(stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('vision-modal').style.display = 'none';
}

async function captureAndProcess() {
  const video = document.getElementById('vision-feed');
  const canvas = document.getElementById('ocr-canvas');
  const ctx = canvas.getContext('2d');
  
  // Flash effect
  document.body.style.backgroundColor = "white";
  setTimeout(() => document.body.style.backgroundColor = "#0a0c0f", 50);

  // Capture the frame
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  
  const captureTime = new Date(); // This is our "Atomic Reference" moment
  
  document.getElementById('capture-btn').innerText = "READING...";
  
  // OCR Magic
  Tesseract.recognize(canvas, 'eng').then(({ data: { text } }) => {
    console.log("OCR Result:", text);
    // Simple logic to find time-like strings (HH:MM:SS)
    const timeMatch = text.match(/\d{1,2}:\d{2}:\d{2}/);
    
    if (timeMatch) {
       alert("Successfully read watch time: " + timeMatch[0]);
       closeVisionScanner();
       // Here you would trigger your existing 'calculateDrift' logic automatically
    } else {
       alert("Couldn't clearly read digits. Try again closer to the lens!");
       document.getElementById('capture-btn').innerText = "CAPTURE TIME";
    }
  });
}

// ... (Rest of your original JS functions like syncTime, saveWatches, etc.) ...
</script>

</body>

</html>
