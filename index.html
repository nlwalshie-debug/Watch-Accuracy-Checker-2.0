<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Accuracy Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
<style>
  :root {
    --bg: #0a0c0f; --surface: #111418; --border: #1e2530;
    --accent: #c8a96e; --red: #e05252; --green: #52c0a0; --blue: #7ab8e0;
    --text: #e8e0d0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; padding:20px; display:flex; flex-direction:column; align-items:center; }
  
  .header { text-align:center; margin-bottom:30px; }
  .header h1 { font-family:'Bebas Neue'; font-size:2.5rem; letter-spacing:2px; color:var(--accent); }
  .header p { color:var(--blue); font-size:0.7rem; font-weight:bold; text-transform:uppercase; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:100%; max-width:500px; padding:25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  .btn { width:100%; padding:18px; border-radius:10px; border:none; cursor:pointer; font-family:'Bebas Neue'; font-size:1.2rem; margin-bottom:15px; transition: 0.2s; text-transform:uppercase; letter-spacing:1px; }
  .btn:active { transform: scale(0.97); }
  .btn-vision { background:var(--blue); color:black; }
  
  #vision-overlay {
    display:none; position:fixed; inset:0; background:black; z-index:9999;
    flex-direction:column; align-items:center; justify-content:center;
  }
  #webcam { width:100%; height:100%; object-fit:cover; position:absolute; }
  
  .scanner-gui {
    position:relative; width:320px; height:160px; border:3px solid var(--blue);
    border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.75);
    display:flex; align-items:center; justify-content:center;
  }
  .scanner-line {
    position:absolute; width:100%; height:3px; background:var(--blue);
    box-shadow: 0 0 15px var(--blue); top:0; animation: scan 2s infinite linear;
  }
  @keyframes scan { 0% {top:0} 100% {top:100%} }

  .controls { position:absolute; bottom:40px; width:90%; display:flex; gap:15px; }
  #hidden-canvas { display:none; }
</style>
</head>
<body>

<div class="header">
  <h1>WATCH ACCURACY PRO</h1>
  <p>Gemini Vision Engine • Active</p>
</div>

<div class="card">
  <button class="btn btn-vision" onclick="startVision()">📷 VISION SYNC</button>
  <div id="results-log" style="margin-top:10px; font-family:'Share Tech Mono'; color:var(--green); font-size:0.9rem; text-align:center;"></div>
</div>

<div id="vision-overlay">
  <video id="webcam" autoplay playsinline></video>
  <div class="scanner-gui">
    <div class="scanner-line"></div>
    <p style="color:var(--blue); font-family:'Share Tech Mono'; position:absolute; top:-35px; font-size:0.8rem; letter-spacing:1px;">ALIGN DIGITAL TIME HERE</p>
  </div>
  <div class="controls">
    <button class="btn" style="background:#222; color:white;" onclick="stopVision()">CANCEL</button>
    <button id="snap-btn" class="btn" style="background:var(--green); color:black;" onclick="takeSnapshot()">CAPTURE TIME</button>
  </div>
  <canvas id="hidden-canvas"></canvas>
</div>

<script>
let stream = null;

async function startVision() {
  const overlay = document.getElementById('vision-overlay');
  overlay.style.display = 'flex';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    document.getElementById('webcam').srcObject = stream;
  } catch (err) {
    alert("Camera Access Denied. Use the HTTPS link from GitHub Pages.");
    stopVision();
  }
}

function stopVision() {
  if(stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('vision-overlay').style.display = 'none';
}

async function takeSnapshot() {
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('hidden-canvas');
  const btn = document.getElementById('snap-btn');
  const ctx = canvas.getContext('2d');
  const atomicRef = new Date(); 

  canvas.width = 640;
  canvas.height = 320;
  ctx.filter = "contrast(180%) grayscale(100%) brightness(105%)";
  ctx.drawImage(video, video.videoWidth/4, video.videoHeight/4, video.videoWidth/2, video.videoHeight/2, 0, 0, 640, 320);
  
  btn.innerText = "READING...";
  btn.disabled = true;

  try {
    const worker = await Tesseract.createWorker();
    await worker.loadLanguage('eng');
    await worker.initialize('eng');
    await worker.setParameters({
      tessedit_char_whitelist: '0123456789:', 
      tessedit_pageseg_mode: '7' 
    });

    const { data: { text } } = await worker.recognize(canvas);
    await worker.terminate();

    const foundTime = text.replace(/\s/g, '').match(/\d{1,2}:\d{2}:\d{2}/);

    if(foundTime) {
      const log = document.getElementById('results-log');
      log.innerHTML = `SUCCESS: Read ${foundTime[0]}<br>Atomic Ref: ${atomicRef.toLocaleTimeString()}`;
      stopVision();
    } else {
      alert("COULDN'T READ DIGITS. Tip: Tilt watch to avoid glare!");
    }
  } catch (e) {
    alert("System Error: " + e.message);
  } finally {
    btn.innerText = "CAPTURE TIME";
    btn.disabled = false;
  }
}
</script>
</body>
</html>
